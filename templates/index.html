<!DOCTYPE html>
<html>
<head>
    <title>Simple QA System</title>
    <style>

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    text-align: center;
    padding: 40px;
    margin: 0;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 90%;
    max-width: 600px;
    margin: auto;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h1 {
    color: #333;
}

input {
    width: 80%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    padding: 12px 15px;
    margin-top: 10px;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    background: #667eea;
    color: white;
    font-size: 15px;
    transition: 0.3s;
}

button:hover {
    background: #5a67d8;
}

.suggestions button {
    margin: 5px;
    background: #f1f1f1;
    color: #333;
}

.suggestions button:hover {
    background: #ddd;
}

#answer {
    margin-top: 20px;
    font-weight: bold;
    font-size: 18px;
    color: #333;
    background: #f4f7ff;
    padding: 15px;
    border-radius: 10px;
    display: none;
}

</style>
</head>
<body>

<div class="container">
    <h1>CSC 309 QA SYSTEM</h1>
    <h3>Ask a Question</h3>

    <input type="text" id="question" placeholder="Type your question here...">
    <br>
    <button onclick="askQuestion()">Ask</button>

    <div id="answer" style="display:none;"></div>

    <h4>Or try one of these:</h4>
    <div class="suggestions">
        {% for q in questions %}
            <button onclick="fillQuestion('{{q}}')">{{q}}</button>
        {% endfor %}
    </div>


</div>

<script>
function fillQuestion(q) {
    document.getElementById("question").value = q;
}

function askQuestion() {
    let question = document.getElementById("question").value;

    fetch("/ask", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({question: question})
    })
    .then(response => response.json())
    .then(data => {
        let answerDiv = document.getElementById("answer");
        answerDiv.innerHTML = "<b>Answer:</b> " + data.answer;
        answerDiv.style.display = "block";
    });
}
</script>

</body>
</html>
